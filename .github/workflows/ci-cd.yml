name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ohjohnsen/ynab-mcp-connector

jobs:
  check-version:
    name: Check Version Uniqueness
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main' || github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep -E "^version\s*=" pyproject.toml | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Check if version tag already exists
        id: check-tag
        run: |
          # Check if tag v{version} exists (e.g., v0.1.0)
          TAG_NAME="v${{ steps.version.outputs.version }}"
          echo "Checking for existing tag: $TAG_NAME"
          
          # Use GitHub API to check for existing tag
          TAG_EXISTS=$(curl -s -H "Authorization: token ${{ github.token }}" \
            "https://api.github.com/repos/${{ github.repository }}/git/ref/tags/$TAG_NAME" \
            | grep -q '"ref"' && echo "exists" || echo "not_exists")
          
          echo "tag_exists=$TAG_EXISTS" >> $GITHUB_OUTPUT
          
          if [ "$TAG_EXISTS" = "exists" ]; then
            echo "::error::Version $VERSION already has a tag ($TAG_NAME) and cannot be reused."
            echo "Please increment the version in pyproject.toml."
            exit 1
          fi

  test:
    name: Run Tests
    needs: check-version
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install pytest-asyncio anyio

      - name: Run tests
        run: |
          # Skip integration tests that require real API keys
          pytest tests/ -v --tb=short -m "not integration"

  build-and-push:
    name: Build and Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ohjohnsen
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep -E "^version\s*=" pyproject.toml | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

      - name: Create GitHub tag
        id: create-tag
        run: |
          TAG_NAME="v${{ steps.version.outputs.version }}"
          echo "Creating tag: $TAG_NAME"
          
          # Use GitHub API to create tag
          # Uses a PAT with repo scope stored in GH_TOKEN secret
          # Fall back to github.token (may not work for forks)
          TOKEN="${{ secrets.GH_TOKEN || github.token }}"
          SHA=$(git rev-parse HEAD)
          
          # Create tag object
          TAG_RESPONSE=$(curl -s -w "%{http_code}" -X POST \
            -H "Authorization: token $TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/git/tags" \
            -d "{\"tag\":\"$TAG_NAME\",\"message\":\"Release v${{ steps.version.outputs.version }}\",\"object\":\"$SHA\",\"type\":\"commit\"}")
          
          HTTP_CODE=${TAG_RESPONSE: -3}
          if [ "$HTTP_CODE" != "201" ]; then
            echo "::error::Failed to create tag object: $TAG_RESPONSE"
            exit 1
          fi
          
          # Create reference to the tag
          REF_RESPONSE=$(curl -s -w "%{http_code}" -X POST \
            -H "Authorization: token $TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/git/refs" \
            -d "{\"ref\":\"refs/tags/$TAG_NAME\",\"sha\":\"$SHA\"}")
          
          HTTP_CODE=${REF_RESPONSE: -3}
          if [ "$HTTP_CODE" != "201" ]; then
            echo "::error::Failed to create tag reference: $REF_RESPONSE"
            exit 1
          fi
          
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Successfully created tag: $TAG_NAME"
