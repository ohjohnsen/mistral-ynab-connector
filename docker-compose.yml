services:
  ynab-connector:
    # Pull pre-built image from Docker Hub
    image: ohjohnsen/ynab-mcp-connector:latest
    pull_policy: always
    
    container_name: ynab-mcp-connector
    ports:
      - "8088:8000"
    restart: unless-stopped

    environment:
      - YNAB_API_KEY=changeme
      - OAUTH_CLIENT_ID=changeme
      - OAUTH_CLIENT_SECRET=changeme

    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/mcp/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# Notes for Synology NAS:
# =====================
#
# 1. PORT FORWARDING
#    - Using standard bridge network with port mapping 8000:8000
#    - The connector will be accessible at: http://<NAS_IP>:8000
#
# 2. REQUIRED CONFIGURATION
#    - YNAB_API_KEY: your YNAB personal access token.
#      Get one from: https://app.youneedabudget.com/settings/personalAccessTokens
#    - OAUTH_CLIENT_ID / OAUTH_CLIENT_SECRET: credentials for the OAuth flow
#      used by MCP clients (e.g. Claude.ai) connecting to this server.
#      Pick any values you like — the connector just compares what it issued
#      against what it receives back.
#
# 3. USAGE
#    - Start: docker-compose up -d
#    - Stop: docker-compose down
#    - View logs: docker-compose logs -f
#    - Test: curl http://localhost:8000/mcp/health  (or use docker inspect to see healthcheck status)
#
# 4. MCP CLIENT CONFIGURATION
#    In Claude.ai, add the connector with URL:
#    http://<NAS_IP>:8000/mcp
#    and complete the OAuth authorization flow when prompted.
#
# 5. CUSTOM PORT
#    To use a different external port (e.g., 9000):
#    Change the ports line to: - "9000:8000"
